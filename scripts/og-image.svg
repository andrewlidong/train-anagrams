<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1118" />
      <stop offset="1" stop-color="#161d28" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />

  <!-- subway bullets spelling SPELL-ish flair -->
  <g font-family="Helvetica, Arial, sans-serif" font-weight="bold" font-size="62" text-anchor="middle">
    <g>
      <circle cx="170" cy="150" r="54" fill="#0039A6" /><text x="170" y="172" fill="#fff">A</text>
      <circle cx="300" cy="150" r="54" fill="#FF6319" /><text x="300" y="172" fill="#fff">F</text>
      <circle cx="430" cy="150" r="54" fill="#FCCC0A" /><text x="430" y="172" fill="#000">N</text>
      <circle cx="560" cy="150" r="54" fill="#6CBE45" /><text x="560" y="172" fill="#fff">G</text>
      <circle cx="690" cy="150" r="54" fill="#996633" /><text x="690" y="172" fill="#fff">J</text>
      <circle cx="820" cy="150" r="54" fill="#EE352E" /><text x="820" y="172" fill="#fff">1</text>
      <circle cx="950" cy="150" r="54" fill="#B933AD" /><text x="950" y="172" fill="#fff">7</text>
      <circle cx="1030" cy="150" r="54" fill="#A7A9AC" /><text x="1030" y="172" fill="#fff">L</text>
    </g>
  </g>

  <circle cx="130" cy="350" r="46" fill="#0039A6" />
  <text x="130" y="368" text-anchor="middle" font-family="Helvetica, Arial, sans-serif" font-size="48" font-weight="bold" fill="#ffffff">S</text>
  <text x="200" y="378" font-family="Helvetica, Arial, sans-serif" font-size="104" font-weight="800" fill="#ffffff">Subway Spell</text>
  <text x="84" y="450" font-family="Helvetica, Arial, sans-serif" font-size="44" fill="#9aa6b2">Spell words by riding NYC subway lines.</text>
  <text x="84" y="520" font-family="Helvetica, Arial, sans-serif" font-size="34" fill="#6b7685">Type FACE → ride the F, A, C, E. Watch the train spell it on the map.</text>
</svg>
